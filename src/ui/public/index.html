<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eggbot</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="logo">🥚 eggbot</span>
        <button id="new-chat-btn" title="New chat">+</button>
      </div>
      <div id="sessions-list"></div>
    </aside>

    <main id="main">
      <div id="chat-header">
        <span id="session-title">New conversation</span>
        <button id="abort-btn" title="Stop current run" class="hidden">■ Stop</button>
      <button id="debug-btn" title="Toggle debug log">⚙ Debug</button>
      </div>

      <div id="messages"></div>

      <div id="input-area">
        <textarea id="input" placeholder="Tell eggbot what to do..." rows="3"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </main>
  </div>

  <div id="debug-panel" class="hidden">
    <div id="debug-header">
      <span>debug log</span>
      <label><input type="checkbox" id="debug-filter-debug" checked> debug</label>
      <label><input type="checkbox" id="debug-filter-info" checked> info</label>
      <label><input type="checkbox" id="debug-filter-warn" checked> warn</label>
      <label><input type="checkbox" id="debug-filter-error" checked> error</label>
      <button id="debug-clear">clear</button>
      <button id="debug-close">✕</button>
    </div>
    <div id="debug-log"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
