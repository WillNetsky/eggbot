<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eggbot</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="logo">🥚 eggbot</span>
        <button id="new-chat-btn" title="New chat">+</button>
      </div>
      <div id="sessions-list"></div>

      <div id="todo-panel">
        <div id="todo-header">
          <span id="todo-title">todos</span>
          <button id="todo-add-btn" title="Add todo">+</button>
        </div>
        <div id="todo-add-form" class="hidden">
          <input id="todo-input" type="text" placeholder="New todo...">
        </div>
        <div id="todo-list"></div>
      </div>
    </aside>

    <main id="main">
      <div id="chat-header">
        <span id="session-title">New conversation</span>
        <div id="header-actions">
          <button id="abort-btn" title="Stop current run" class="hidden">■ Stop</button>
          <button id="activity-btn" title="Toggle activity panel">Activity</button>
        </div>
      </div>

      <div id="messages"></div>

      <div id="input-area">
        <textarea id="input" placeholder="Tell eggbot what to do..." rows="3"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </main>

    <aside id="activity-panel">
      <div id="activity-header">
        <div id="activity-status">
          <span id="activity-dot" class="activity-dot idle"></span>
          <span id="activity-label">idle</span>
        </div>
        <button id="activity-clear" title="Clear">clear</button>
      </div>
      <div id="activity-log"></div>
    </aside>
  </div>

  <script src="/app.js"></script>
</body>
</html>
