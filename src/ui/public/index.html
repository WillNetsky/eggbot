<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eggbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">eggbot</span>
        </div>
        <button id="new-chat-btn" title="New conversation">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="sidebar-section-label">Projects</div>
      <div id="sessions-list"></div>

      <div id="todo-panel">
        <div id="todo-header">
          <span id="todo-title">Todos</span>
          <button id="todo-add-btn" title="Add todo">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div id="todo-add-form" class="hidden">
          <input id="todo-input" type="text" placeholder="What needs doing...">
        </div>
        <div id="todo-list"></div>
      </div>
    </aside>

    <main id="main">
      <div id="chat-header">
        <span id="session-title">New conversation</span>
        <div id="header-actions">
          <button id="abort-btn" class="btn-danger hidden" title="Stop current run">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10" rx="1"/></svg>
            Stop
          </button>
          <button id="team-btn" title="Toggle team panel">Team</button>
        </div>
      </div>

      <div id="messages"></div>

      <div id="input-area">
        <textarea id="input" placeholder="Tell eggbot what to do..." rows="2"></textarea>
        <button id="send-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="currentColor"/></svg>
        </button>
      </div>
    </main>

    <aside id="team-panel">
      <div id="team-header">
        <div id="team-status">
          <span id="status-dot" class="status-dot idle"></span>
          <span id="status-label">idle</span>
        </div>
        <div id="team-controls">
          <span id="agent-count"></span>
          <button id="team-clear" title="Clear">Clear</button>
        </div>
      </div>
      <div id="team-floor"></div>
    </aside>
  </div>

  <script src="/app.js"></script>
</body>
</html>
