<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eggbot</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="logo">🥚 eggbot</span>
        <button id="new-chat-btn" title="New chat">+</button>
      </div>
      <div id="sessions-list"></div>
    </aside>

    <main id="main">
      <div id="chat-header">
        <span id="session-title">New conversation</span>
        <button id="abort-btn" title="Stop current run" class="hidden">■ Stop</button>
      </div>

      <div id="messages"></div>

      <div id="input-area">
        <textarea id="input" placeholder="Tell eggbot what to do..." rows="3"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
